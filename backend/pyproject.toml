[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"apps/*/admin.py" = ["F401"]
"apps/*/models.py" = ["F401"]
"apps/*/tests.py" = ["F401"]
"apps/*/views.py" = ["F401"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100
